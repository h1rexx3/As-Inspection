<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS Inspection</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Inter',sans-serif;
    background:#0f1115;
    color:white;
    overflow-x:hidden;
}

/* HEADER */

header{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(12px);
    z-index:1000;
}

.logo{
    font-size:28px;
    font-weight:800;
}

nav{
    display:flex;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:30px;
    transition:0.3s;
    font-weight:500;
}

nav a:hover{
    color:#f5b942;
}

/* LANGUAGE */

.lang-switch{
    display:flex;
    gap:10px;
}

.lang-switch button{
    background:rgba(255,255,255,0.08);
    border:none;
    color:white;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

.lang-switch button:hover{
    background:#f5b942;
    color:black;
    transform:translateY(-2px);
}

/* HERO */

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.7)),
    url('hero.jpg') center/cover;
    display:flex;
    align-items:center;
    padding:0 8%;
}

.hero-content{
    max-width:700px;
    animation:fadeUp 1.2s ease;
}

.hero h1{
    font-size:72px;
    line-height:1.1;
    margin-bottom:25px;
}

.hero p{
    font-size:20px;
    color:#d0d0d0;
    margin-bottom:35px;
    line-height:1.7;
}

.btn{
    display:inline-block;
    padding:16px 38px;
    background:#f5b942;
    color:black;
    border-radius:14px;
    text-decoration:none;
    font-weight:700;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-4px) scale(1.03);
    background:white;
}

/* SECTION */

section{
    padding:120px 8%;
}

.section-title{
    font-size:48px;
    margin-bottom:60px;
    text-align:center;
}

/* SERVICES */

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:35px;
}

.card{
    background:#171a21;
    border-radius:24px;
    overflow:hidden;
    transition:all 0.5s ease;
    border:1px solid rgba(255,255,255,0.06);

    opacity:0;
    transform:translateY(80px);
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card:hover{
    transform:translateY(-12px) scale(1.02);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.card-content{
    padding:30px;
}

.card h3{
    font-size:28px;
    margin-bottom:15px;
}

.card p{
    color:#bcbcbc;
    line-height:1.7;
}

/* ABOUT */

.about{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:60px;
    align-items:center;
}

.about img,
.about-text,
.stat,
.contact{
    opacity:0;
    transform:translateY(80px);
    transition:all 1s ease;
}

.show{
    opacity:1 !important;
    transform:translateY(0) !important;
}

.about img{
    width:100%;
    border-radius:25px;
}

.about-text h2{
    font-size:48px;
    margin-bottom:25px;
}

.about-text p{
    color:#cfcfcf;
    line-height:1.9;
    font-size:18px;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    margin-top:60px;
}

.stat{
    background:#171a21;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

.stat h3{
    font-size:42px;
    color:#f5b942;
    margin-bottom:10px;
}

/* CONTACT */

.contact{
    text-align:center;
    background:#171a21;
    border-radius:30px;
    padding:80px 30px;
}

.contact h2{
    font-size:52px;
    margin-bottom:25px;
}

.contact p{
    font-size:20px;
    color:#d0d0d0;
    margin-bottom:15px;
}

/* FOOTER */

footer{
    padding:40px 8%;
    text-align:center;
    color:#888;
}

/* ANIMATIONS */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:900px){

header{
    flex-direction:column;
    gap:20px;
}

.hero h1{
    font-size:46px;
}

.about{
    grid-template-columns:1fr;
}

nav{
    flex-wrap:wrap;
    justify-content:center;
}

nav a{
    margin:10px;
}

/* ✅ FIX ДЛЯ ТЕЛЕФОНА (главное исправление) */

body{
    padding-top: 150px;
}

.hero{
    padding-top: 10px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">AS Inspection</div>

<nav>
<a href="#services">Pakalpojumi</a>
<a href="#about">Par mums</a>
<a href="#contact">Kontakti</a>
</nav>

<div class="lang-switch">
<button onclick="setLanguage('lv')">LV</button>
<button onclick="setLanguage('en')">EN</button>
<button onclick="setLanguage('ru')">RU</button>
</div>

</header>

<section class="hero">

<div class="hero-content">

<h1 class="hero-title">
Premium būvniecības un metināšanas risinājumi
</h1>

<p class="hero-text">
Profesionāli metināšanas, montāžas un metālkonstrukciju pakalpojumi visā Latvijā.
Mūsdienīgi risinājumi, kvalitāte un precizitāte katrā projektā.
</p>

<a href="#contact" class="btn contact-btn">
Sazināties
</a>

</div>

</section>

<!-- остальной код без изменений -->

</body>
</html>
